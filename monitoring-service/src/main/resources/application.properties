spring.application.name=monitoring-service
server.port=8082

# =========================
# DATABASE
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5432/monitoringdb
spring.datasource.username=postgres
spring.datasource.password=0000
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================
# JWT
# =========================
jwt.secret=c2VjdXJlLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLW1pbi0zMi1jaGFycw==

# IMPORTANT: Must be same secret as auth-service and api-gateway

# =========================
# REDIS
# =========================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=2000ms

# =========================
# LOGGING
# =========================
logging.level.com.raj.monitoring.monitoringservice=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
